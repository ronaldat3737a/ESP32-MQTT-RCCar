<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta charset="utf-8" />
    <title>MQTT ESP32 RC Car Dashboard</title>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
      body {
        text-align: center;
        font-family: Arial, sans-serif;
        margin-top: 20px;
        background-color: #1a1a1a;
        color: white;
      }

      /* --- THÊM MỚI RFID: CSS cho trạng thái Khóa --- */
      #lockStatus {
        margin: 10px auto;
        padding: 12px;
        border-radius: 8px;
        max-width: 350px;
        font-weight: bold;
        font-size: 18px;
        color: white;
        border: 2px solid #555;
        transition: 0.3s;
      }
      /* ---------------------------------------------- */

      /* --- CSS Menu Chọn Chế Độ --- */
      .mode-panel {
        background-color: #333;
        padding: 10px;
        border-radius: 10px;
        max-width: 350px;
        margin: 0 auto 15px auto;
        display: flex;
        justify-content: space-around;
      }
      .btn-mode {
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }
      #btnManual {
        background-color: #2196f3;
      }
      #btnAuto {
        background-color: #555;
      }

      /* --- Khung cảnh báo (Siêu âm) --- */
      #warningBox {
        margin: 10px auto;
        padding: 12px;
        border-radius: 8px;
        max-width: 350px;
        font-weight: bold;
        font-size: 16px;
        background-color: #444;
        color: white;
        border: 2px solid #555;
        transition: 0.3s;
      }
      .alert-danger {
        background-color: #ff4c4c !important;
        border-color: #ff0000 !important;
      }
      .alert-safe {
        background-color: #4caf50 !important;
        border-color: #3e8e41 !important;
      }

      /* --- Khung Vận tốc (Odometry) --- */
      #telemetryBox {
        margin: 10px auto;
        padding: 12px;
        border-radius: 8px;
        max-width: 350px;
        font-weight: bold;
        font-size: 16px;
        background-color: #1e88e5;
        color: white;
        border: 2px solid #1565c0;
      }

      /* --- Bản đồ 2D (Canvas) --- */
      .map-container {
        margin: 15px auto;
        max-width: 350px;
        background-color: #000;
        border: 3px solid #333;
        border-radius: 10px;
        position: relative;
        box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
      }
      #mapCanvas {
        display: block;
        width: 100%;
        border-radius: 7px;
      }
      .btn-reset {
        position: absolute;
        bottom: 10px;
        right: 10px;
        background-color: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid white;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
      }
      .btn-reset:active {
        background-color: rgba(255, 255, 255, 0.5);
      }

      /* --- Các nút điều khiển --- */
      .btn {
        background-color: #4caf50;
        border: none;
        color: white;
        padding: 15px;
        font-size: 28px;
        border-radius: 15px;
        width: 80px;
        height: 80px;
        margin: 5px;
        user-select: none;
        -webkit-user-select: none;
        box-shadow: 0 4px #2e7d32;
      }
      .btn:active {
        background-color: #3e8e41;
        box-shadow: 0 1px #2e7d32;
        transform: translateY(3px);
      }
      .btn-stop {
        background-color: #f44336;
        box-shadow: 0 4px #c62828;
      }
      .btn-stop:active {
        background-color: #da190b;
        box-shadow: 0 1px #c62828;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        max-width: 300px;
        margin: 15px auto;
      }
      .empty {
        visibility: hidden;
      }
      #status {
        margin-bottom: 10px;
        font-weight: bold;
        color: orange;
      }
    </style>
    <script>
      const broker = "wss://broker.emqx.io:8084/mqtt";
      const topic_control = "hust/iot/rccar/control_v1";
      const topic_warn = "hust/iot/rccar/warning_v1";
      const topic_telemetry = "hust/iot/rccar/telemetry_v1";

      const client = mqtt.connect(broker);

      // Khai báo biến demoMode toàn cục
      let demoMode = false;

      // Hàm bật/tắt chế độ Demo và cập nhật giao diện hiển thị
      function toggleDemoMode() {
        demoMode = !demoMode;
        let btn = document.getElementById("btnDemo");
        let lockBox = document.getElementById("lockStatus");
        
        if (demoMode) {
          btn.innerText = "🖥️ Tắt Chế độ Mô phỏng (Demo)";
          btn.style.backgroundColor = "#4caf50";
          
          // Giả lập trạng thái đã mở khóa để cho phép điều khiển
          lockBox.innerText = "🔓 XE ĐÃ MỞ KHÓA (DEMO)";
          lockBox.className = "alert-safe"; // Chuyển ô khóa sang màu xanh
        } else {
          btn.innerText = "🖥️ Bật Chế độ Mô phỏng (Demo)";
          btn.style.backgroundColor = "#ff9800";
          
          // Trả về trạng thái khóa thông thường
          lockBox.innerText = "🔒 XE ĐANG BỊ KHÓA";
          lockBox.className = "alert-danger"; // Chuyển ô khóa sang màu đỏ 
          
          document.getElementById("telemetryBox").innerHTML =
          "Vận tốc: 0 cm/s <br> Quãng đường đi: 0 cm";

          resetMap();
        }
      }

      // BIẾN TOÀN CỤC BẢN ĐỒ
      let currentCommand = "S";
      let posX = 0,
        posY = 0,
        angleDeg = 0;
      let path = [{ x: posX, y: posY }];
      let isTurning = 0,
        lastTime = Date.now(),
        lastDistance = -1,
        currentTotalDistance = 0;
      const TURN_SPEED_DEG_PER_SEC = 90,
        PIXELS_PER_CM = 2.0;

      client.on("connect", function () {
        document.getElementById("status").innerText = "Đã kết nối Server MQTT";
        document.getElementById("status").style.color = "lightgreen";
        client.subscribe(topic_warn);
        client.subscribe(topic_telemetry);
      });

      client.on("offline", function () {
        document.getElementById("status").innerText = "Đang mất kết nối";
        document.getElementById("status").style.color = "red";
      });

      client.on("message", function (topic, message) {
        if (topic === topic_warn) {
          let msgStr = message.toString();
          let warnBox = document.getElementById("warningBox");
          warnBox.innerText = msgStr;

          if (msgStr.includes("CẢNH BÁO")) warnBox.className = "alert-danger";
          else if (msgStr.includes("AN TOÀN")) warnBox.className = "alert-safe";

          // --- THÊM MỚI RFID: Cập nhật giao diện Ổ Khóa ---
          let lockBox = document.getElementById("lockStatus");
          if (msgStr.includes("Đã mở khóa")) {
            lockBox.innerText = "🔓 XE ĐÃ MỞ KHÓA";
            lockBox.className = "alert-safe"; // Xanh
          } else if (
            msgStr.includes("Xe đang bị khóa") ||
            msgStr.includes("Thẻ sai")
          ) {
            lockBox.innerText = "🔒 XE ĐANG BỊ KHÓA";
            lockBox.className = "alert-danger"; // Đỏ
          }
          // ------------------------------------------------
        } else if (topic === topic_telemetry) {
          let data = message.toString().split("|");
          if (data.length === 2) {
            document.getElementById("telemetryBox").innerHTML =
              "Vận tốc: " +
              data[0] +
              " cm/s <br> Quãng đường đi: " +
              data[1] +
              " cm";

            let newDist = parseFloat(data[1]);
            currentTotalDistance = newDist;
            if (lastDistance === -1) lastDistance = newDist;

            let deltaDist = newDist - lastDistance;
            lastDistance = newDist;

            if (
              deltaDist > 0 &&
              (currentCommand === "F" || currentCommand === "B")
            ) {
              let directionMultiplier = currentCommand === "B" ? -1 : 1;
              let rad = ((angleDeg - 90) * Math.PI) / 180;
              posX +=
                deltaDist * Math.cos(rad) * PIXELS_PER_CM * directionMultiplier;
              posY +=
                deltaDist * Math.sin(rad) * PIXELS_PER_CM * directionMultiplier;
              path.push({ x: posX, y: posY });
            }
          }
        }
      });

      function setMode(mode) {
        if (mode === "AUTO") {
          document.getElementById("btnAuto").style.backgroundColor = "#4caf50";
          document.getElementById("btnManual").style.backgroundColor = "#555";
          if (client.connected) client.publish(topic_control, "AUTO");
        } else {
          document.getElementById("btnManual").style.backgroundColor =
            "#2196F3";
          document.getElementById("btnAuto").style.backgroundColor = "#555";
          if (client.connected && mode === "MANUAL")
            client.publish(topic_control, "MANUAL");
        }
      }

      function lockCar() {
        if (client.connected) client.publish(topic_control, "LOCK");
      }

      function sendCommand(cmd) {
        if (client.connected) client.publish(topic_control, cmd);
        currentCommand = cmd;
        if (cmd === "L") isTurning = -1;
        else if (cmd === "R") isTurning = 1;
        else isTurning = 0;
        if (cmd === "F" || cmd === "B" || cmd === "L" || cmd === "R")
          setMode("MANUAL_OVERRIDE");
      }

      function resetMap() {
        posX = 0;
        posY = 0;
        angleDeg = 0;
        path = [{ x: posX, y: posY }];
        lastDistance = currentTotalDistance;
      }

      function renderLoop() {
        let now = Date.now();
        let dt = (now - lastTime) / 1000.0;
        lastTime = now;

        if (isTurning !== 0)
          angleDeg += isTurning * TURN_SPEED_DEG_PER_SEC * dt;

        // GIẢ LẬP DI CHUYỂN KHI BẬT CHẾ ĐỘ DEMO
        if (demoMode) {
          if (currentCommand === "F" || currentCommand === "B") {
            let speed = 20; // Giả lập vận tốc xe chạy là 20 cm/s
            let deltaDist = speed * dt; // Quãng đường đi được trong thời gian dt
            currentTotalDistance += deltaDist;

            // Cập nhật giao diện Telemetry trực tiếp bằng dữ liệu giả lập
            document.getElementById("telemetryBox").innerHTML =
              "Vận tốc (Demo): " + speed + " cm/s <br> Quãng đường đi: " + Math.round(currentTotalDistance) + " cm";

            let directionMultiplier = currentCommand === "B" ? -1 : 1;
            let rad = ((angleDeg - 90) * Math.PI) / 180;
            
            // Cập nhật tọa độ của xe
            posX += deltaDist * Math.cos(rad) * PIXELS_PER_CM * directionMultiplier;
            posY += deltaDist * Math.sin(rad) * PIXELS_PER_CM * directionMultiplier;
            
            // Lưu tọa độ mới vào lộ trình vẽ đường đi
            path.push({ x: posX, y: posY });
          }
        }        
        

        let canvas = document.getElementById("mapCanvas");
        if (canvas) {
          let ctx = canvas.getContext("2d");
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          let centerX = canvas.width / 2;
          let centerY = canvas.height / 2;

          let leftWorld = posX - centerX;
          let rightWorld = posX + centerX;
          let topWorld = posY - centerY;
          let bottomWorld = posY + centerY;

          ctx.strokeStyle = "#222";
          ctx.lineWidth = 1;

          // Vẽ lưới tọa độ dọc di chuyển theo xe
          let startX = Math.floor(leftWorld / 25) * 25;
          let endX = Math.ceil(rightWorld / 25) * 25;
          for (let x = startX; x <= endX; x += 25) {
            let sX = centerX + (x - posX);
            ctx.beginPath();
            ctx.moveTo(sX, 0);
            ctx.lineTo(sX, canvas.height);
            ctx.stroke();
          }

          // Vẽ lưới tọa độ ngang di chuyển theo xe
          let startY = Math.floor(topWorld / 25) * 25;
          let endY = Math.ceil(bottomWorld / 25) * 25;
          for (let y = startY; y <= endY; y += 25) {
            let sY = centerY + (y - posY);
            ctx.beginPath();
            ctx.moveTo(0, sY);
            ctx.lineTo(canvas.width, sY);
            ctx.stroke();
          }

          // Vẽ lộ trình đường đi tương đối
          if (path.length > 0) {
            ctx.strokeStyle = "#4caf50";
            ctx.lineWidth = 3;
            ctx.beginPath();
            let startSX = centerX + (path[0].x - posX);
            let startSY = centerY + (path[0].y - posY);
            ctx.moveTo(startSX, startSY);
            for (let i = 1; i < path.length; i++) {
              let sX = centerX + (path[i].x - posX);
              let sY = centerY + (path[i].y - posY);
              ctx.lineTo(sX, sY);
            }
            ctx.stroke();
          }

          // Vẽ xe luôn ở chính giữa màn hình (centerX, centerY)
          ctx.save();
          ctx.translate(centerX, centerY);
          ctx.rotate((angleDeg * Math.PI) / 180);
          ctx.fillStyle = "#ff4c4c";
          ctx.beginPath();
          ctx.moveTo(0, -12);
          ctx.lineTo(-8, 8);
          ctx.lineTo(0, 4);
          ctx.lineTo(8, 8);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
        requestAnimationFrame(renderLoop);
      }

      window.onload = function () {
        requestAnimationFrame(renderLoop);
      };
    </script>
  </head>
  <body>
    <h2>🚀 BẢNG ĐIỀU KHIỂN AIoT</h2>
    <div id="status">Đang kết nối Server...</div>

    <!-- Nút bật/tắt Chế độ Demo -->
    <div class="mode-panel">
      <button class="btn-mode" id="btnDemo" style="background-color: #ff9800; width: 100%;" onclick="toggleDemoMode()">
        🖥️ Bật Chế độ Mô phỏng (Demo)
      </button>
    </div>


    <!-- --- THÊM MỚI RFID: Khung trạng thái Khóa Xe --- -->
    <div id="lockStatus" class="alert-danger">🔒 XE ĐANG BỊ KHÓA</div>
    <!-- ----------------------------------------------- -->

    <!-- Menu Chọn Chế Độ -->
    <div class="mode-panel">
      <button class="btn-mode" id="btnManual" onclick="setMode('MANUAL')">
        🕹️ Bằng tay
      </button>
      <button class="btn-mode" id="btnAuto" onclick="setMode('AUTO')">
        🤖 Bám vạch
      </button>
    </div>

    <!-- --- THÊM MỚI: Nút Khóa xe thủ công --- -->
    <div class="mode-panel">
      <button
        class="btn-mode"
        id="btnLock"
        style="background-color: #e53935; width: 100%"
        onclick="lockCar()"
      >
        🔒 Khóa xe
      </button>
    </div>
    <!-- --------------------------------------- -->

    <!-- Khung hiển thị cảnh báo (Siêu âm / RFID lỗi) -->
    <div id="warningBox">Chưa có dữ liệu cảm biến...</div>

    <!-- Khung hiển thị Vận tốc (Encoder) -->
    <div id="telemetryBox">
      Vận tốc: 0 cm/s <br />
      Quãng đường đi: 0 cm
    </div>

    <!-- BẢN ĐỒ RADAR LỘ TRÌNH -->
    <div class="map-container">
      <canvas id="mapCanvas" width="350" height="300"></canvas>
      <button class="btn-reset" onclick="resetMap()">🔄 Reset Lộ Trình</button>
    </div>

    <!-- Nút điều khiển -->
    <div class="grid">
      <div class="empty"></div>
      <button
        class="btn"
        onmousedown="sendCommand('F')"
        onmouseup="sendCommand('S')"
        ontouchstart="sendCommand('F')"
        ontouchend="sendCommand('S')"
      >
        ⬆️
      </button>
      <div class="empty"></div>
      <button
        class="btn"
        onmousedown="sendCommand('L')"
        onmouseup="sendCommand('S')"
        ontouchstart="sendCommand('L')"
        ontouchend="sendCommand('S')"
      >
        ⬅️
      </button>
      <button class="btn btn-stop" onclick="sendCommand('S')">⏹️</button>
      <button
        class="btn"
        onmousedown="sendCommand('R')"
        onmouseup="sendCommand('S')"
        ontouchstart="sendCommand('R')"
        ontouchend="sendCommand('S')"
      >
        ➡️
      </button>
      <div class="empty"></div>
      <button
        class="btn"
        onmousedown="sendCommand('B')"
        onmouseup="sendCommand('S')"
        ontouchstart="sendCommand('B')"
        ontouchend="sendCommand('S')"
      >
        ⬇️
      </button>
      <div class="empty"></div>
    </div>
  </body>
</html>
