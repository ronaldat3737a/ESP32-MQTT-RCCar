<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta charset="utf-8" />
    <title>MQTT ESP32 RC Car</title>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
      body {
        text-align: center;
        font-family: Arial;
        margin-top: 30px;
        background-color: #222;
        color: white;
      }
      /* --- THÊM MỚI: CSS cho khung cảnh báo --- */
      #warningBox {
        margin: 15px auto;
        padding: 15px;
        border-radius: 10px;
        max-width: 350px;
        font-weight: bold;
        font-size: 18px;
        background-color: #444;
        color: white;
        border: 2px solid #555;
        transition: 0.3s;
      }
      .alert-danger {
        background-color: #ff4c4c !important;
        border-color: #ff0000 !important;
      }
      .alert-safe {
        background-color: #4caf50 !important;
        border-color: #3e8e41 !important;
      }
      /* ---------------------------------------- */

      /* --- THÊM MỚI ODOMETRY: CSS khung Tốc độ --- */
      #telemetryBox {
        margin: 10px auto 25px auto;
        padding: 15px;
        border-radius: 10px;
        max-width: 350px;
        font-weight: bold;
        font-size: 18px;
        background-color: #1e88e5;
        color: white;
        border: 2px solid #1565c0;
      }
      /* ------------------------------------------- */

      .btn {
        background-color: #4caf50;
        border: none;
        color: white;
        padding: 20px;
        font-size: 30px;
        border-radius: 15px;
        width: 100px;
        height: 100px;
        margin: 10px;
        user-select: none;
        -webkit-user-select: none;
      }
      .btn:active {
        background-color: #3e8e41;
      }
      .btn-stop {
        background-color: #f44336;
      }
      .btn-stop:active {
        background-color: #da190b;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        max-width: 400px;
        margin: 0 auto;
      }
      .empty {
        visibility: hidden;
      }
      #status {
        margin-bottom: 10px;
        font-weight: bold;
        color: orange;
      }
    </style>
    <script>
      const broker = "wss://broker.emqx.io:8084/mqtt";
      const topic_control = "hust/iot/rccar/control_v1";
      const topic_warn = "hust/iot/rccar/warning_v1"; // Topic nhận cảnh báo
      const topic_telemetry = "hust/iot/rccar/telemetry_v1"; // Topic nhận tốc độ

      const client = mqtt.connect(broker);

      client.on("connect", function () {
        document.getElementById("status").innerText = "Đã kết nối Server MQTT";
        document.getElementById("status").style.color = "lightgreen";

        // --- THÊM MỚI: Đăng ký nhận tin nhắn cảnh báo & tốc độ ---
        client.subscribe(topic_warn);
        client.subscribe(topic_telemetry);
      });

      client.on("offline", function () {
        document.getElementById("status").innerText = "Đang mất kết nối";
        document.getElementById("status").style.color = "red";
      });

      // --- THÊM MỚI: Xử lý khi có tin nhắn từ xe gửi lên Web ---
      client.on("message", function (topic, message) {
        if (topic === topic_warn) {
          let msgStr = message.toString();
          let warnBox = document.getElementById("warningBox");

          warnBox.innerText = msgStr;

          // Đổi màu box tùy theo nội dung cảnh báo
          if (msgStr.includes("CẢNH BÁO")) {
            warnBox.className = "alert-danger"; // Chuyển nền đỏ
          } else if (msgStr.includes("AN TOÀN")) {
            warnBox.className = "alert-safe"; // Chuyển nền xanh
          }
        }
        // --- THÊM MỚI ODOMETRY: Tách chuỗi hiển thị tốc độ ---
        else if (topic === topic_telemetry) {
          let data = message.toString().split("|"); // Tách bằng ký tự "|"
          if (data.length === 2) {
            document.getElementById("telemetryBox").innerHTML =
              "Vận tốc: " +
              data[0] +
              " cm/s <br> Quãng đường đi: " +
              data[1] +
              " cm";
          }
        }
      });
      // ---------------------------------------------------------

      function sendCommand(cmd) {
        if (client.connected) {
          client.publish(topic_control, cmd);
        }
      }
    </script>
  </head>
  <body>
    <h2>ĐIỀU KHIỂN XE MQTT</h2>
    <div id="status">Đang kết nối Server...</div>

    <!-- --- THÊM MỚI: Khung hiển thị cảnh báo (Siêu âm) --- -->
    <div id="warningBox">Chưa có dữ liệu cảm biến...</div>
    <!-- ----------------------------------------- -->

    <!-- --- THÊM MỚI ODOMETRY: Khung hiển thị Vận tốc (Encoder) --- -->
    <div id="telemetryBox">
      Vận tốc: 0 cm/s <br />
      Quãng đường đi: 0 cm
    </div>
    <!-- ------------------------------------------------- -->

    <div class="grid">
      <div class="empty"></div>
      <button
        class="btn"
        onmousedown="sendCommand('F')"
        onmouseup="sendCommand('S')"
        ontouchstart="sendCommand('F')"
        ontouchend="sendCommand('S')"
      >
        ⬆️
      </button>
      <div class="empty"></div>

      <button
        class="btn"
        onmousedown="sendCommand('L')"
        onmouseup="sendCommand('S')"
        ontouchstart="sendCommand('L')"
        ontouchend="sendCommand('S')"
      >
        ⬅️
      </button>
      <button class="btn btn-stop" onclick="sendCommand('S')">⏹️</button>
      <button
        class="btn"
        onmousedown="sendCommand('R')"
        onmouseup="sendCommand('S')"
        ontouchstart="sendCommand('R')"
        ontouchend="sendCommand('S')"
      >
        ➡️
      </button>

      <div class="empty"></div>
      <button
        class="btn"
        onmousedown="sendCommand('B')"
        onmouseup="sendCommand('S')"
        ontouchstart="sendCommand('B')"
        ontouchend="sendCommand('S')"
      >
        ⬇️
      </button>
      <div class="empty"></div>
    </div>
  </body>
</html>
